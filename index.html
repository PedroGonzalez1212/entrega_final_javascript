<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>simulador de cuotas</title>
    <link rel="stylesheet" href="styles.css">
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <h1>Simulador de Cuotas y Descuentos</h1>
<input type="number" id="monto" placeholder="Monto a financiar">
<input type="number" id="cuotas" placeholder="Número de cuotas">
<select id="formaPago">
    <option value="efectivo">Efectivo</option>
    <option value="debito">Débito</option>
    <option value="credito">Crédito</option>
    </select>
<button id="calcularBtn">Calcular</button>
<div id="resultado"></div>
    <script src="simulador.js"></script>
</body>
</html>
